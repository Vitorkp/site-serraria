<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title data-i18n="orcamento.metaTitulo">
    Quote - Florestal Pinus
  </title>

  <link rel="icon" type="image/png" href="logo-florestal.png">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>

  <div class="logo-text">Florestal Pinus <span>Sul Brasil</span></div>

  <nav>

    <a href="index.html" data-i18n="nav.inicio">Home  </a>
    <a href="produtos.html" data-i18n="nav.produtos">Products</a>
  </nav>

<div class="header-actions">

  <a href="login.html" class="login-topo" data-i18n="nav.login">
    Login
  </a>

  <div class="toggle-container">

    <span class="toggle-label pt-label ativo">
      PT
    </span>

    <label class="switch">

      <input
        type="checkbox"
        id="lang-checkbox"
        onchange="alternarSwitch(this)"
      >

      <div class="slider">
        <div class="knob"></div>
      </div>

    </label>

    <span class="toggle-label en-label">
      EN
    </span>

  </div>

</div>

</header>

<main>

  <section>

    <h1 class="titulo" data-i18n="orcamento.titulo">
      Request your quote
    </h1>

    <p class="subtitulo" data-i18n="orcamento.subtitulo">
      Fill in the information below and our team will contact you
    </p>

    <form class="formulario">
      <label for="nome" data-i18n="orcamento.nomeLabel">
        Full name
      </label>

      <input
        type="text"
        id="nome"
        data-i18n-placeholder="orcamento.nomePlaceholder"
        placeholder="Enter your name"
        required
      >

      <label for="telefone" data-i18n="orcamento.telefoneLabel">
        Phone / WhatsApp
      </label>

      <input
        type="tel"
        id="telefone"
        placeholder="(00) 00000-0000"
        required
      >

      <label for="email" data-i18n="orcamento.emailLabel">
        E-mail
      </label>

      <input
        type="email"
        id="email"
        data-i18n-placeholder="orcamento.emailPlaceholder"
        placeholder="your@email.com"
      >

      <label for="produto" data-i18n="orcamento.produtoLabel">
        Desired product
      </label>

      <select id="produto" required>

        <option value="" data-i18n="orcamento.produtoSelecionar">
          Select a product
        </option>

        <option value="pinus" data-i18n="orcamento.produtoPinus">
          Pine Wood
        </option>

        <option value="pallets" data-i18n="orcamento.produtoPallets">
          Pallets
        </option>

        <option value="cavaco" data-i18n="orcamento.produtoCavaco">
          Wood Chips
        </option>

      </select>

      <label for="quantidade" data-i18n="orcamento.quantidadeLabel">
        Approximate quantity
      </label>

      <input
        type="text"
        id="quantidade"
        data-i18n-placeholder="orcamento.quantidadePlaceholder"
        placeholder="Example: 50 units, 10m³, 2 tons"
      >

      <label for="cidade" data-i18n="orcamento.cidadeLabel">
        City
      </label>

      <input
        type="text"
        id="cidade"
        data-i18n-placeholder="orcamento.cidadePlaceholder"
        placeholder="Enter your city"
      >

      <label for="mensagem" data-i18n="orcamento.observacoesLabel">
        Notes
      </label>

      <textarea
        id="mensagem"
        rows="5"
        data-i18n-placeholder="orcamento.observacoesPlaceholder"
        placeholder="Describe your request details"
      ></textarea>

      <button type="submit" data-i18n="orcamento.botaoEnviar">
        Send quote request
      </button>
    </form>
  </section>
</main>

<footer>
  <p data-i18n="footer.texto">
    &copy; 2026 Florestal Pinus - Fast service for quotations.
  </p>
</footer>

<script src="script.js"></script>

</body>
</html>
